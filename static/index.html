<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro — Panel de Gestión</title>
    <meta name="description" content="Sistema profesional de gestión de inventario con control de stock, ventas y autenticación segura.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ============ PANTALLA DE LOGIN ============ -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">📦</div>
                <h1>Inventario <span>Pro</span></h1>
                <p class="auth-subtitle">Sistema de Gestión de Stock</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="tab-login">Iniciar Sesión</button>
                <button class="auth-tab" data-tab="register" id="tab-register">Registrarse</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">Usuario</label>
                    <input type="text" id="login-username" placeholder="Tu nombre de usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="Tu contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btn-login">
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-username">Usuario</label>
                    <input type="text" id="register-username" placeholder="Elegí un nombre de usuario" required minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btn-register">
                    <span class="btn-text">Crear Cuenta</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>

            <div id="auth-message" class="auth-message hidden"></div>
        </div>
    </div>

    <!-- ============ DASHBOARD PRINCIPAL ============ -->
    <div id="dashboard" class="dashboard hidden">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-logo">📦</div>
                <h1 class="header-title">Inventario <span>Pro</span></h1>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span class="user-name" id="user-name">Usuario</span>
                </div>
                <button class="btn btn-ghost" id="btn-logout" title="Cerrar Sesión">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon stat-icon-blue">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Total Productos</p>
                    <h2 class="stat-value" id="stat-products">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-green">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Unidades en Stock</p>
                    <h2 class="stat-value" id="stat-stock">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-orange">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Stock Bajo</p>
                    <h2 class="stat-value" id="stat-low-stock">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-purple">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Valor Total</p>
                    <h2 class="stat-value" id="stat-value">$0</h2>
                </div>
            </div>
        </section>

        <!-- Products Section -->
        <section class="products-section">
            <div class="section-header">
                <h2 class="section-title">Productos</h2>
                <div class="section-actions">
                    <div class="search-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-input" placeholder="Buscar producto..." autocomplete="off">
                    </div>
                    <button class="btn btn-primary" id="btn-add-product">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nuevo Producto
                    </button>
                </div>
            </div>

            <div class="table-container">
                <table class="products-table" id="products-table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Mín. Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <!-- Se llena dinámicamente con JS -->
                    </tbody>
                </table>
                <div class="empty-state hidden" id="empty-state">
                    <div class="empty-icon">📭</div>
                    <h3>No hay productos</h3>
                    <p>Agregá tu primer producto para comenzar</p>
                </div>
            </div>
        </section>
    </div>

    <!-- ============ MODAL: CREAR/EDITAR PRODUCTO ============ -->
    <div id="product-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nuevo Producto</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <form id="product-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="product-name">Nombre *</label>
                        <input type="text" id="product-name" required minlength="1" maxlength="100" placeholder="Ej: Notebook HP">
                    </div>
                    <div class="form-group">
                        <label for="product-price">Precio *</label>
                        <input type="number" id="product-price" required min="0.01" step="0.01" placeholder="Ej: 459999.99">
                    </div>
                </div>
                <div class="form-group">
                    <label for="product-description">Descripción</label>
                    <input type="text" id="product-description" maxlength="500" placeholder="Ej: Laptop 15 pulgadas, 16GB RAM">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="product-stock">Stock *</label>
                        <input type="number" id="product-stock" required min="0" step="1" placeholder="Ej: 25">
                    </div>
                    <div class="form-group">
                        <label for="product-min-stock">Stock Mínimo</label>
                        <input type="number" id="product-min-stock" min="0" step="1" value="5" placeholder="Ej: 5">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="btn-cancel-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-product">
                        <span class="btn-text">Guardar</span>
                        <span class="btn-loader hidden"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============ TOAST NOTIFICATIONS ============ -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
